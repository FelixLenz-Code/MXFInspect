name: Build cross-platform binaries

on:
  push:
    branches: [ master, crossplatform-rewrite ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  APP_PROJECT: MXFInspect.Avalonia/MXFInspect.Avalonia.csproj

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run parser regression tests
        run: dotnet test MXFInspect.Tests/MXFInspect.Tests.csproj -c Release

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            kind: appimage
          - os: windows-latest
            rid: win-x64
            kind: exe
          - os: macos-latest
            rid: osx-arm64
            kind: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained
        shell: bash
        run: |
          dotnet publish "$APP_PROJECT" -c Release -r ${{ matrix.rid }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -o publish/${{ matrix.rid }}

      # ---------- Linux: AppImage ----------
      - name: Package AppImage
        if: matrix.kind == 'appimage'
        run: |
          chmod +x build/linux/build-appimage.sh
          build/linux/build-appimage.sh publish/${{ matrix.rid }} dist x86_64

      # ---------- Windows: single-file exe ----------
      - name: Package Windows exe
        if: matrix.kind == 'exe'
        shell: bash
        run: |
          mkdir -p dist
          cp "publish/${{ matrix.rid }}/MXFInspect.exe" "dist/MXFInspect-win-x64.exe"

      # ---------- macOS: .app + .dmg ----------
      - name: Package macOS dmg
        if: matrix.kind == 'dmg'
        run: |
          chmod +x build/macos/build-dmg.sh
          build/macos/build-dmg.sh publish/${{ matrix.rid }} dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MXFInspect-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
